<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CLICKER 3.7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <!-- Модальное окно входа -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <h2>🔐 Вход в игру</h2>
            <div class="input-wrapper">
                <input type="text" id="loginInput" placeholder="Ваш ник" maxlength="20" autocomplete="off">
                <span class="input-hint" id="nicknameHint">🔍 Проверка...</span>
            </div>
            <p class="modal-hint">Никнейм должен быть уникальным</p>
            <div class="modal-buttons">
                <button class="btn-primary" id="loginBtn" disabled>Войти</button>
                <button class="btn-secondary" id="loadGameFile">Загрузить .click</button>
            </div>
        </div>
    </div>

    <!-- Основная игра -->
    <div class="game-container" id="gameContainer" style="display: none;">
        
        <!-- Верхняя панель -->
        <div class="top-panel">
            <div class="player-info" id="profileBtn">
                <div class="avatar" id="playerAvatar">👤</div>
                <div class="player-details">
                    <span class="player-name" id="playerName">Игрок</span>
                    <span class="player-level" id="playerLevel">Уровень 1</span>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle">🌙</button>
                <button class="menu-btn" id="menuToggle">☰</button>
            </div>
        </div>

        <!-- Боковое меню (адаптивное) -->
        <div class="side-menu" id="sideMenu">
            <div class="menu-header">
                <span>Меню</span>
                <button class="close-menu" id="closeMenu">✕</button>
            </div>
            <div class="menu-items">
                <button class="menu-item active" data-tab="profile">👤 Профиль</button>
                <button class="menu-item" data-tab="friends">👥 Друзья</button>
                <button class="menu-item" data-tab="clubs">🏰 Клубы</button>
                <button class="menu-item" data-tab="shop">🏪 Магазин</button>
                <button class="menu-item" data-tab="skins">🎨 Скины</button>
                <button class="menu-item" data-tab="codes">🔑 Промокоды</button>
                <button class="menu-item" data-tab="leaders">🏆 Топ</button>
                <button class="menu-item" data-tab="settings">⚙️ Настройки</button>
            </div>
            <div class="menu-footer">
                <button class="btn-save" id="saveToFile">💾 Сохранить</button>
                <button class="btn-logout" id="logoutBtn">🚪 Выйти</button>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-icon">💰</span>
                <span class="stat-value" id="balance">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">⚡</span>
                <span class="stat-value" id="power">1</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">📈</span>
                <span class="stat-value" id="cps">0</span>
            </div>
        </div>

        <!-- Кнопка кликера -->
        <div class="clicker-wrapper">
            <button class="clicker-btn" id="clickBtn">
                <span class="clicker-emoji">👆</span>
                <span class="clicker-text">КЛИК</span>
            </button>
        </div>

        <!-- Быстрые действия -->
        <div class="action-row">
            <button class="action-button" id="dailyBtn">
                <span class="action-icon">📅</span>
                <span class="action-text">День</span>
            </button>
            <button class="action-button" id="boxBtn">
                <span class="action-icon">📦</span>
                <span class="action-text">Бокс</span>
            </button>
            <button class="action-button" id="friendsQuickBtn">
                <span class="action-icon">👥</span>
                <span class="action-text">Друзья</span>
            </button>
        </div>

        <!-- Контентная область -->
        <div class="content-wrapper" id="contentWrapper">
            <!-- Профиль -->
            <div class="tab-content active" id="profile">
                <div class="profile-section">
                    <div class="profile-avatar-large">👤</div>
                    <div class="profile-stats">
                        <div class="stat-row">
                            <span>Всего кликов:</span>
                            <span id="profileClicks">0</span>
                        </div>
                        <div class="stat-row">
                            <span>Заработано:</span>
                            <span id="profileEarned">0</span>
                        </div>
                        <div class="stat-row">
                            <span>Боксов открыто:</span>
                            <span id="profileBoxes">0</span>
                        </div>
                        <div class="stat-row">
                            <span>Дней в игре:</span>
                            <span id="profileDays">1</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Друзья -->
            <div class="tab-content" id="friends">
                <h3>👥 Друзья</h3>
                <div class="friends-container" id="friendsContainer">
                    <!-- Динамическая загрузка -->
                </div>
            </div>

            <!-- Клубы -->
            <div class="tab-content" id="clubs">
                <h3>🏰 Клубы</h3>
                <div class="clubs-container" id="clubsContainer">
                    <!-- Динамическая загрузка -->
                </div>
            </div>

            <!-- Магазин -->
            <div class="tab-content" id="shop">
                <h3>🏪 Магазин</h3>
                <div class="shop-grid" id="shopGrid">
                    <!-- Динамическая загрузка -->
                </div>
            </div>

            <!-- Скины -->
            <div class="tab-content" id="skins">
                <h3>🎨 Скины</h3>
                <div class="skins-grid" id="skinsGrid">
                    <!-- Динамическая загрузка -->
                </div>
            </div>

            <!-- Промокоды -->
            <div class="tab-content" id="codes">
                <h3>🔑 Промокоды</h3>
                <div class="codes-container">
                    <input type="text" id="promoInput" placeholder="Введите промокод">
                    <button class="btn-primary" id="applyPromo">Активировать</button>
                </div>
            </div>

            <!-- Топ игроков -->
            <div class="tab-content" id="leaders">
                <h3>🏆 Топ игроков</h3>
                <div class="leaderboard" id="leaderboard"></div>
            </div>

            <!-- Настройки -->
            <div class="tab-content" id="settings">
                <h3>⚙️ Настройки</h3>
                <div class="settings-container" id="settingsContainer">
                    <!-- Динамическая загрузка -->
                </div>
            </div>
        </div>

        <!-- Плавающий автокликер -->
        <div class="auto-float" id="floatingAuto">
            <div class="auto-header">
                <span class="auto-icon">🤖</span>
                <span class="auto-count" id="autoCount">0</span>
            </div>
            <div class="auto-status" id="autoStatus">⏸️</div>
            <div class="auto-timer" id="autoTimer">0/сек</div>
            <div class="auto-controls">
                <button class="auto-btn" id="autoPowerBtn">▶️</button>
                <button class="auto-btn" id="autoTurboBtn">⚡</button>
            </div>
            <div class="auto-drag-handle" id="autoDragHandle">⋮⋮</div>
        </div>
    </div>

    <!-- Уведомления -->
    <div class="notification-area" id="notifications"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
